<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#101210"><title>Play - Song Battle</title><link rel="stylesheet" href="/styles.css"><style>
  html,body{max-width:100%;overflow-x:hidden}
  .phone-main,.phone-phase,.track,.vote-grid>*{min-width:0;max-width:100%}
  .phone-page.embedded{padding-bottom:15px;background:var(--bg)}
  .phone-page.embedded>header{display:none}
  .phone-page.embedded .phone-main{width:min(620px,calc(100% - 20px))}
  @media(max-width:420px){.search{display:grid;grid-template-columns:minmax(0,1fr) auto}.vote-grid{grid-template-columns:minmax(0,1fr) minmax(0,1fr)}.vote-card{min-width:0}.vote-card strong,.vote-card span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}}
</style></head><body class="phone-page"><header><a class="brand" href="/">Song<span>Battle</span></a><span id="phone-code" class="pill"></span></header><main class="phone-main"><section id="rejoin" class="panel" hidden><h1>Join the room</h1><form id="rejoin-form"><label>Your name<input id="rejoin-name" maxlength="30" required></label><button>Join</button></form></section>
<section id="phone-app" hidden><div class="phone-welcome"><p class="eyebrow">YOU ARE PLAYING AS</p><h1 id="your-name"></h1></div>
<section id="phone-picks" class="phone-phase"><h2>Choose your two songs</h2><p class="muted">Your choices stay secret until the game ends.</p><form id="search-form" class="search"><input id="search-query" placeholder="Search songs or artists" required><button>Search</button></form><div id="search-results" class="track-list"></div><h3>Your picks</h3><div id="your-picks" class="track-list"></div><button id="ready">I'm ready</button></section>
<section id="phone-wait" class="phone-phase center" hidden><div class="pulse">&#9835;</div><h2 id="wait-title">Waiting for the Host</h2><p id="wait-copy" class="muted"></p></section>
<section id="phone-vote" class="phone-phase" hidden><p class="eyebrow">CAST YOUR VOTE</p><h2>Which song wins?</h2><div class="vote-grid"><button class="vote-card" data-side="a"><img alt=""><strong></strong><span></span></button><button class="vote-card" data-side="b"><img alt=""><strong></strong><span></span></button></div><p id="vote-note" class="status"></p></section>
<section id="phone-results" class="phone-phase" hidden><p class="eyebrow">FINAL RESULTS</p><img id="phone-champion-cover" class="champion-small" alt=""><h1 id="phone-champion"></h1><h2>This round</h2><ol id="phone-curators" class="score-list"></ol><h2 id="phone-overall-title">Overall</h2><ol id="phone-overall-curators" class="score-list"></ol></section></section><p id="phone-status" class="status"></p></main><script type="module" src="/play.js"></script></body></html>
