<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#101210"><title>Song Battle Party</title><link rel="stylesheet" href="/styles.css"></head><body>
<header><a class="brand" href="/">Song<span>Battle</span></a></header>
<main class="landing"><section class="hero"><p class="eyebrow">A PARTY GAME FOR MUSIC PEOPLE</p><h1>Pick songs.<br>Win the room.</h1><p class="lead">One Spotify-powered screen. Everyone votes from their phone.</p></section>
<section class="choice-grid"><article class="panel choice"><p class="eyebrow">ON THE BIG SCREEN</p><h2>Host a game</h2><p>Connect a Spotify Premium account, create a room, and control the music.</p><a class="button" href="/host">Host with Spotify</a></article>
<article class="panel choice"><p class="eyebrow">ON YOUR PHONE</p><h2>Join a room</h2><form id="join-form"><label>Room code<input id="room-code" autocomplete="off" inputmode="text" maxlength="6" placeholder="ABC234" required></label><label>Your name<input id="display-name" autocomplete="nickname" maxlength="30" placeholder="Alex" required></label><button>Join game</button></form><p id="join-status" class="status" role="status"></p></article></section></main>
<script type="module" src="/landing.js"></script></body></html>
